services:
  temporal-db:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      - temporal-db
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  order-service:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    ports:
      - "5201:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  stock-service:
    build:
      context: .
      dockerfile: src/StockService/Dockerfile
    ports:
      - "5202:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentService/Dockerfile
    ports:
      - "5203:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  saga-orchestrator:
    build:
      context: .
      dockerfile: src/SagaOrchestrator/Dockerfile
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Services__OrderService=http://order-service:8080
      - Services__StockService=http://stock-service:8080
      - Services__PaymentService=http://payment-service:8080
      - Temporal__Host=temporal:7233
    restart: on-failure
    depends_on:
      temporal:
        condition: service_healthy
      order-service:
        condition: service_started
      stock-service:
        condition: service_started
      payment-service:
        condition: service_started

volumes:
  temporal-db-data:
